<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 400" width="360" height="400">
  <defs>
    <radialGradient id="hGreen" cx="50%" cy="40%" r="65%">
      <stop offset="0%"  stop-color="#3fc25c"/>
      <stop offset="65%" stop-color="#1e9c3c"/>
      <stop offset="100%" stop-color="#0d6824"/>
    </radialGradient>
    <linearGradient id="hGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fde58a"/>
      <stop offset="35%"  stop-color="#e6c057"/>
      <stop offset="65%"  stop-color="#b88f2e"/>
      <stop offset="100%" stop-color="#7e5d18"/>
    </linearGradient>
    <linearGradient id="hRibbon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f7d977"/>
      <stop offset="50%"  stop-color="#d3a943"/>
      <stop offset="100%" stop-color="#8a6618"/>
    </linearGradient>
    <linearGradient id="hRibbonDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#b58629"/>
      <stop offset="100%" stop-color="#5d3f0f"/>
    </linearGradient>
    <filter id="hShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ribbons (behind seal) -->
  <g filter="url(#hShadow)">
    <!-- left ribbon tail -->
    <path d="M 100,275 L 70,395 L 110,375 L 145,355 L 130,310 Z" fill="url(#hRibbon)"/>
    <path d="M 70,395 L 110,375 L 100,355 Z" fill="url(#hRibbonDark)" opacity="0.55"/>
    <!-- right ribbon tail -->
    <path d="M 260,275 L 290,395 L 250,375 L 215,355 L 230,310 Z" fill="url(#hRibbon)"/>
    <path d="M 290,395 L 250,375 L 260,355 Z" fill="url(#hRibbonDark)" opacity="0.55"/>
  </g>

  <!-- 12-point scalloped gold seal (outer) -->
  <g transform="translate(180 175)" filter="url(#hShadow)">
    <path fill="url(#hGold)" d="
      M 0,-150
      L 39,-141 L 75,-130 L 106,-106 L 130,-75 L 141,-39 L 150,0
      L 141,39 L 130,75 L 106,106 L 75,130 L 39,141 L 0,150
      L -39,141 L -75,130 L -106,106 L -130,75 L -141,39 L -150,0
      L -141,-39 L -130,-75 L -106,-106 L -75,-130 L -39,-141 Z"/>
    <!-- highlight rim -->
    <path fill="none" stroke="#ffeaa0" stroke-width="2.5" opacity="0.6" d="
      M 0,-138 L 35,-130 L 69,-119 L 98,-97 L 120,-69 L 130,-36 L 138,0
      L 130,36 L 120,69 L 98,97 L 69,119 L 35,130 L 0,138
      L -35,130 L -69,119 L -98,97 L -120,69 L -130,36 L -138,0
      L -130,-36 L -120,-69 L -98,-97 L -69,-119 L -35,-130 Z"/>
  </g>

  <!-- inner green disc -->
  <circle cx="180" cy="175" r="118" fill="url(#hGreen)"/>
  <!-- thin gold inner ring -->
  <circle cx="180" cy="175" r="118" fill="none" stroke="url(#hGold)" stroke-width="3"/>
  <circle cx="180" cy="175" r="108" fill="none" stroke="#f6e5a3" stroke-width="1.2" opacity="0.55"/>

  <!-- Arabic حلال -->
  <text x="180" y="148" text-anchor="middle"
        font-family="'Amiri','Scheherazade New','Traditional Arabic',serif"
        font-size="50" font-weight="700" fill="#ffffff">حلال</text>

  <!-- HALAL -->
  <text x="180" y="200" text-anchor="middle"
        font-family="'Inter','Arial Black',sans-serif"
        font-size="32" font-weight="900" fill="#ffffff" letter-spacing="2">HALAL</text>

  <!-- subtitle -->
  <text x="180" y="226" text-anchor="middle"
        font-family="'Inter','Arial',sans-serif"
        font-size="11" font-weight="700" fill="#ffffff" letter-spacing="1">100% QUALITY</text>
  <text x="180" y="242" text-anchor="middle"
        font-family="'Inter','Arial',sans-serif"
        font-size="11" font-weight="700" fill="#ffffff" letter-spacing="1">PRODUCT</text>
</svg>
